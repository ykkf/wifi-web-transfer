<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wi-Fi Web Transfer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4F46E5;
      --bg: #0F172A;
      --surface: #1E293B;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; padding: 2rem 0;
    }
    .container {
      background: var(--surface);
      padding: 2.5rem;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 90%; max-width: 600px;
    }
    h1 {
      margin-top: 0; font-weight: 800; font-size: 1.8rem;
      background: linear-gradient(135deg, #38BDF8, #818CF8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .meta { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }

    .btn-zip {
      display: block; width: 100%; text-align: center;
      background: linear-gradient(135deg, #4F46E5, #6366F1); color: white;
      text-decoration: none; padding: 1rem; border-radius: 12px;
      font-weight: 600; font-size: 1.1rem; margin-bottom: 2rem;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3); transition: transform 0.2s;
      box-sizing: border-box;
    }
    .btn-zip:hover { transform: translateY(-2px); opacity: 0.9; }

    .file-list { list-style: none; padding: 0; margin: 0; }
    .file-item {
      background: rgba(255,255,255,0.05); padding: 1rem 1.5rem;
      border-radius: 12px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .file-name { font-weight: 600; word-break: break-all; }
    .file-size { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

    .btn-download {
      background: rgba(255,255,255,0.1); color: #60A5FA;
      text-decoration: none; padding: 0.5rem 1rem;
      border-radius: 8px; font-weight: 600; font-size: 0.9rem;
      white-space: nowrap; margin-left: 1rem; transition: background 0.2s;
    }
    .btn-download:hover { background: rgba(255,255,255,0.2); }

    #errorMsg { color: #F87171; text-align: center; font-weight: 600; display: none; }
    #loading { text-align: center; color: var(--text-muted); }
    .content-area { display: none; }
  </style>
</head>
<body>

  <div class="container">
    <div id="loading">Loading...</div>
    <div id="errorMsg"></div>

    <div class="content-area" id="contentArea">
      <h1 id="pageTitle"></h1>
      <div class="meta" id="metaInfo"></div>

      <a href="#" id="zipBtn" class="btn-zip">ZIPファイルで一括ダウンロード</a>

      <ul class="file-list" id="fileList"></ul>

      <div style="margin-top: 3rem; text-align: center;">
        <a href="/" style="display:inline-block; background: rgba(255,255,255,0.05); color: #94A3B8; text-decoration: none; padding: 0.8rem 1.5rem; border-radius: 12px; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); transition: background 0.2s;">← トップに戻る</a>
      </div>
    </div>
  </div>

  <script>
    var sessionId = window.location.pathname.split('/').pop();

    async function fetchMetadata() {
      try {
        var res = await fetch('/api/files/' + sessionId);
        var data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Failed to load.');
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('contentArea').style.display = 'block';
        document.getElementById('pageTitle').textContent = 'Shared Files';

        var expireDate = new Date(data.expiresAt).toLocaleString();
        document.getElementById('metaInfo').textContent = data.files.length + ' files | Expires: ' + expireDate;

        document.getElementById('zipBtn').href = '/api/download/' + sessionId + '/zip/all';
        if (data.files.length === 1) {
           document.getElementById('zipBtn').style.display = 'none';
        }

        var list = document.getElementById('fileList');
        data.files.forEach(function(f) {
          var li = document.createElement('li');
          li.className = 'file-item';
          var sizeKb = (f.size / 1024).toFixed(1);

          var infoDiv = document.createElement('div');
          infoDiv.style.flexGrow = '1';
          infoDiv.style.minWidth = '0'; // important for text ellipsis if needed
          var nameDiv = document.createElement('div');
          nameDiv.className = 'file-name';
          nameDiv.textContent = f.name;
          var sizeDiv = document.createElement('div');
          sizeDiv.className = 'file-size';
          sizeDiv.textContent = sizeKb + ' KB';
          infoDiv.appendChild(nameDiv);
          infoDiv.appendChild(sizeDiv);

          var dlLink = document.createElement('a');
          dlLink.href = '/api/download/' + sessionId + '/' + f.index;
          dlLink.className = 'btn-download';
          dlLink.textContent = 'ダウンロード';
          
          var isImage = f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i);
          if (isImage) {
            var thumb = document.createElement('img');
            thumb.src = dlLink.href;
            thumb.style.cssText = 'width: 50px; height: 50px; object-fit: cover; border-radius: 6px; margin-right: 15px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); background: #000;';
            li.appendChild(thumb);
          } else {
            var thumbDummy = document.createElement('div');
            thumbDummy.style.cssText = 'width: 50px; height: 50px; border-radius: 6px; background: rgba(255,255,255,0.05); margin-right: 15px; flex-shrink: 0; display:flex; align-items:center; justify-content:center; color:#94A3B8; font-size:0.7rem; font-weight:bold; border: 1px solid rgba(255,255,255,0.1);';
            thumbDummy.textContent = f.name.split('.').pop().toUpperCase() || 'FILE';
            li.appendChild(thumbDummy);
          }

          li.appendChild(infoDiv);
          li.appendChild(dlLink);
          list.appendChild(li);
        });

      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        var errEl = document.getElementById('errorMsg');
        errEl.style.display = 'block';
        errEl.textContent = err.message;
      }
    }

    fetchMetadata();
  </script>
</body>
</html>
