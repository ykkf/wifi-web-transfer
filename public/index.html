<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Transfer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --bg: #0F172A;
      --surface: #1E293B;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: var(--surface);
      padding: 3rem;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 90%;
      max-width: 500px;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #60A5FA, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: var(--text-muted); margin-bottom: 2rem; }

    .file-drop-area {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border: 2px dashed rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 2rem;
    }
    .file-drop-area:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--primary);
    }
    .file-drop-area input[type="file"] {
      position: absolute; left: 0; top: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }
    .file-msg { font-weight: 600; font-size: 1.1rem; pointer-events: none; }

    select {
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0F172A;
      color: white;
      font-size: 1rem;
      margin-bottom: 2rem;
      outline: none;
      box-sizing: border-box;
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      width: 100%;
      cursor: pointer;
      transition: transform 0.1s, background 0.3s;
      box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
    }
    button:hover { background: var(--primary-hover); transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    button:disabled { background: #334155; transform: none; cursor: not-allowed; box-shadow: none; }

    #resultArea { display: none; margin-top: 2rem; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    #qrcode {
      background: white;
      padding: 15px;
      border-radius: 16px;
      margin: 0 auto 1.5rem auto;
      display: inline-block;
    }
    .url-box {
      background: rgba(0,0,0,0.3);
      padding: 1rem;
      border-radius: 8px;
      word-break: break-all;
      user-select: all;
      color: #60A5FA;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .progress-area {
      display: none;
      margin-bottom: 1rem;
    }
    .progress-bar-bg {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4F46E5, #818CF8);
      border-radius: 6px;
      width: 0%;
      transition: width 0.3s;
    }
    .progress-text {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .error-text {
      color: #F87171;
      margin-top: 1rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Web Transfer</h1>
    <p class="subtitle">Pick files and share instantly</p>

    <div id="uploadArea">
      <div class="file-drop-area" id="dropArea">
        <div class="file-msg" id="fileMsg">Tap to select files</div>
        <input type="file" id="fileInput" multiple>
      </div>

      <select id="expireSelect">
        <option value="10">Expires in: 10 min</option>
        <option value="60" selected>Expires in: 60 min</option>
        <option value="1440">Expires in: 24 hours</option>
      </select>

      <div class="progress-area" id="progressArea">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">Preparing...</div>
      </div>

      <button id="submitBtn" disabled>Send Files</button>
      <div class="error-text" id="errorText" style="display:none;"></div>
    </div>

    <div id="resultArea">
      <p style="color: #4ADE80; font-weight: bold; font-size: 1.2rem;">Upload Complete!</p>
      <div id="qrcode"></div>
      <p>Share this URL or scan QR code:</p>
      <div class="url-box" id="shareUrl"></div>
      <button style="margin-top: 1.5rem; background: #334155;" onclick="location.reload()">Send more files</button>
    </div>
  </div>

  <script>
    var fileInput = document.getElementById('fileInput');
    var fileMsg = document.getElementById('fileMsg');
    var submitBtn = document.getElementById('submitBtn');
    var progressArea = document.getElementById('progressArea');
    var progressFill = document.getElementById('progressFill');
    var progressText = document.getElementById('progressText');
    var errorText = document.getElementById('errorText');
    var uploadArea = document.getElementById('uploadArea');
    var resultArea = document.getElementById('resultArea');

    fileInput.addEventListener('change', function() {
      if (fileInput.files.length > 0) {
        fileMsg.textContent = fileInput.files.length + ' file(s) selected';
        document.getElementById('dropArea').style.borderColor = '#60A5FA';
        submitBtn.disabled = false;
      } else {
        fileMsg.textContent = 'Tap to select files';
        document.getElementById('dropArea').style.borderColor = 'rgba(255,255,255,0.2)';
        submitBtn.disabled = true;
      }
    });

    function readFileAsBase64(file) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function() {
          // result is "data:mime;base64,XXXX" - extract just the base64 part
          var base64 = reader.result.split(',')[1];
          resolve({
            name: file.name,
            type: file.type || 'application/octet-stream',
            size: file.size,
            data: base64
          });
        };
        reader.onerror = function() { reject(reader.error); };
        reader.readAsDataURL(file);
      });
    }

    submitBtn.addEventListener('click', async function() {
      if (fileInput.files.length === 0) return;

      submitBtn.disabled = true;
      errorText.style.display = 'none';
      progressArea.style.display = 'block';
      progressText.textContent = 'Reading files...';
      progressFill.style.width = '10%';

      try {
        // Convert all files to base64
        var filesData = [];
        for (var i = 0; i < fileInput.files.length; i++) {
          progressText.textContent = 'Reading file ' + (i + 1) + ' of ' + fileInput.files.length + '...';
          progressFill.style.width = (10 + (i / fileInput.files.length) * 40) + '%';
          var fileData = await readFileAsBase64(fileInput.files[i]);
          filesData.push(fileData);
        }

        progressText.textContent = 'Uploading...';
        progressFill.style.width = '60%';

        var payload = {
          files: filesData,
          expireMinutes: document.getElementById('expireSelect').value
        };

        var res = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        progressFill.style.width = '90%';

        if (!res.ok) {
          var errData = await res.json().catch(function() { return { error: 'Server error (status ' + res.status + ')' }; });
          throw new Error(errData.error || 'Upload failed');
        }

        var data = await res.json();

        if (data.success) {
          progressFill.style.width = '100%';
          progressText.textContent = 'Done!';

          setTimeout(function() {
            uploadArea.style.display = 'none';
            resultArea.style.display = 'block';
            document.getElementById('shareUrl').textContent = data.shareUrl;

            // Generate QR Code
            QRCode.toCanvas(document.createElement('canvas'), data.shareUrl, {
              width: 200,
              margin: 2,
              color: { dark: '#0F172A', light: '#FFFFFF' }
            }, function(err, canvas) {
              if (!err) {
                document.getElementById('qrcode').appendChild(canvas);
              }
            });
          }, 500);
        } else {
          throw new Error(data.error || 'Unknown error');
        }

      } catch (err) {
        progressArea.style.display = 'none';
        errorText.style.display = 'block';
        errorText.textContent = 'Error: ' + err.message;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
