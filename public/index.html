<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wi-Fi Web Transfer - 送信</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --bg: #0F172A;
      --surface: #1E293B;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: var(--surface);
      padding: 3rem;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 90%;
      max-width: 500px;
      text-align: center;
      transition: all 0.3s ease;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #60A5FA, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: var(--text-muted); margin-bottom: 2rem; }
    
    .file-drop-area {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border: 2px dashed rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 2rem;
    }
    .file-drop-area:hover, .file-drop-area.dragover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--primary);
    }
    .file-drop-area input[type="file"] {
      position: absolute; left: 0; top: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }
    .file-msg { font-weight: 600; font-size: 1.1rem; pointer-events: none; }
    
    select {
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0F172A;
      color: white;
      font-size: 1rem;
      margin-bottom: 2rem;
      outline: none;
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      width: 100%;
      cursor: pointer;
      transition: transform 0.1s, background 0.3s;
      box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
    }
    button:hover { background: var(--primary-hover); transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    button:disabled { background: #334155; transform: none; cursor: not-allowed; box-shadow: none; }

    /* Results section */
    #resultArea { display: none; margin-top: 2rem; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    #qrcode {
      background: white;
      padding: 15px;
      border-radius: 16px;
      margin: 0 auto 1.5rem auto;
      display: inline-block;
    }
    .url-box {
      background: rgba(0,0,0,0.3);
      padding: 1rem;
      border-radius: 8px;
      word-break: break-all;
      user-select: all;
      color: #60A5FA;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .spinner {
      display: none;
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s ease-in-out infinite;
      margin: 0 auto 1rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
  </style>
</head>
<body>

  <div class="container" id="mainContainer">
    <h1>Web Transfer</h1>
    <p>ブラウザだけでファイルを素早く共有</p>

    <form id="uploadForm">
      <div class="file-drop-area" id="dropArea">
        <div class="file-msg" id="fileMsg">ここをタップしてファイルを選択<br>（またはドラッグ&ドロップ）</div>
        <input type="file" id="fileInput" name="files" multiple required>
      </div>

      <select name="expireMinutes" id="expireSelect">
        <option value="10">有効期限: 10分</option>
        <option value="60" selected>有効期限: 60分</option>
        <option value="1440">有効期限: 24時間</option>
      </select>

      <div class="spinner" id="spinner"></div>
      <button type="submit" id="submitBtn">ファイルを送信</button>
    </form>

    <div id="resultArea">
      <p style="color: #4ADE80; font-weight: bold;">アップロード完了！</p>
      <div id="qrcode"></div>
      <p>このURLを共有するか、QRコードをスキャンしてください：</p>
      <div class="url-box" id="shareUrl"></div>
      
      <button style="margin-top: 1.5rem; background: #334155; color: white;" onclick="location.reload()">別のファイルを送る</button>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileMsg = document.getElementById('fileMsg');
    const dropArea = document.getElementById('dropArea');
    const form = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const resultArea = document.getElementById('resultArea');
    const shareUrlDiv = document.getElementById('shareUrl');

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        const count = fileInput.files.length;
        fileMsg.innerHTML = `<span style="color:#60A5FA">${count}</span> 個のファイルが選択されています`;
        dropArea.style.borderColor = '#60A5FA';
      } else {
        fileMsg.innerHTML = 'ここをタップしてファイルを選択<br>（またはドラッグ&ドロップ）';
        dropArea.style.borderColor = 'rgba(255, 255, 255, 0.2)';
      }
    });

    ['dragenter', 'dragover'].forEach(evt => dropArea.addEventListener(evt, (e) => {
      e.preventDefault(); dropArea.classList.add('dragover');
    }));
    ['dragleave', 'drop'].forEach(evt => dropArea.addEventListener(evt, (e) => {
      e.preventDefault(); dropArea.classList.remove('dragover');
    }));

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if(fileInput.files.length === 0) return;

      submitBtn.style.display = 'none';
      spinner.style.display = 'block';

      const formData = new FormData();
      for(let i = 0; i < fileInput.files.length; i++) {
        formData.append('files', fileInput.files[i]);
      }
      formData.append('expireMinutes', document.getElementById('expireSelect').value);

      try {
        const res = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        
        if (data.success) {
          form.style.display = 'none';
          resultArea.style.display = 'block';
          
          shareUrlDiv.innerText = data.shareUrl;
          
          // Generate QR Code
          QRCode.toCanvas(document.createElement('canvas'), data.shareUrl, {
            width: 200,
            margin: 2,
            color: { dark: '#0F172A', light: '#FFFFFF' }
          }, function (err, canvas) {
            if (!err) {
              document.getElementById('qrcode').appendChild(canvas);
            }
          });
        } else {
          alert('エラーが発生しました: ' + (data.error || '不明なエラー'));
          submitBtn.style.display = 'block';
        }
      } catch (err) {
        alert('Upload failed. Error: ' + err.message);
        submitBtn.style.display = 'block';
      } finally {
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
